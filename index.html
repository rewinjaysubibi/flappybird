<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flappy Bird</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-wrap">
      <canvas id="gameCanvas" width="420" height="640" aria-label="Flappy Bird game"></canvas>

      <section class="hud">
        <div class="score">Score: <span id="score">0</span></div>
        <div class="best">Best: <span id="best">0</span></div>
      </section>
      <p class="author-label">Made by REWIN JAY</p>

      <section class="overlay" id="overlay">
        <h1>Flappy Bird</h1>
        <p>Press Space, click, or tap to fly.</p>
        <button id="startBtn" type="button">Start Game</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
